name: Bug Report
description: Report a bug or unexpected behavior in Mobilewright
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a bug report, please [search existing issues](https://github.com/mobile-next/mobilewright/issues) to avoid duplicates.

  - type: input
    id: version
    attributes:
      label: Mobilewright version
      placeholder: "e.g. 1.2.3"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. macOS 15.4, Ubuntu 24.04"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Target platform
      options:
        - iOS
        - Android
        - Both
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device or simulator
      placeholder: "e.g. iPhone 16 Pro (simulator), Pixel 8 (real device)"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Smallest possible code or steps to reproduce the issue.
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Logs, screenshots, or anything else that may be relevant.
